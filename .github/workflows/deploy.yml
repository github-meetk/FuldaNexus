name: Production Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Get the latest code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configure SSH Key
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # 3. Connect and Deploy
      - name: Deploy to EC2
        env:
          EC2_USER: ubuntu
          EC2_HOST: 52.58.223.194
          PROJECT_DIR: /home/ubuntu/Fulda-Fall-2025-Team2
        run: |
          ssh -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << EOF
            set -e

            echo "🚀 Starting Deployment to fuldanexus.app..."
            cd "$PROJECT_DIR"

            echo "⬇️ Pulling latest code..."
            git fetch --all
            git checkout main
            git reset --hard origin/main

            echo "🧹 Cleaning up to save disk space..."
            sudo docker system prune -af

            echo "🏗️ Rebuilding Nginx (Frontend) and Backend..."
            sudo docker compose up --build -d

            echo "🔄 Syncing Chroma Events..."
            sudo docker exec -e PYTHONPATH=/app fastapi-backend python scripts/sync_chroma_events.py

            echo "✅ Deployment Finished!"
          EOF